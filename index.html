<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5719496512652584" crossorigin="anonymous"></script>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TandilProp | Mercado Inmobiliario</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        /* Reset total para evitar el scroll fantasma */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            background: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }
        
        /* Capas */
        #landing-page { 
            display: block; 
            height: 100%; 
            overflow-y: auto; 
            width: 100%; 
        }
        
        /* LA APP: Ahora usamos flex-col para que el nav no desaparezca */
        .app-shell { 
            display: none; 
            flex-direction: column; 
            height: 100vh; 
            width: 100%; 
            position: fixed; 
            top: 0; 
            left: 0; 
            z-index: 2000; 
            background: white; 
        }

        /* Colores de pines */
        .pin-casa { filter: hue-rotate(190deg) brightness(0.9); }
        .pin-depto { filter: hue-rotate(15deg) saturate(3); }
        .pin-terreno { filter: hue-rotate(80deg) brightness(0.8); }

        /* Estructura Header */
        header { 
            height: 110px; 
            border-bottom: 2px solid #f1f5f9; 
            padding: 10px; 
            flex-shrink: 0; 
            background: white;
        }
        
        /* Contenedor central: Aquí vive el mapa y la lista */
        .main-content { 
            flex: 1; 
            position: relative; 
            overflow: hidden; 
        }
        
        #map { width: 100%; height: 100%; z-index: 1; }
        
        .view { 
            position: absolute; 
            inset: 0; 
            background: white; 
            z-index: 10; 
            display: none; 
        }
        .view.active { display: block; }
        #v-list, #v-form { overflow-y: auto; }

        /* NAVEGACIÓN: Forzamos que sea visible y tenga altura fija */
        nav { 
            height: 75px; 
            border-top: 2px solid #f1f5f9; 
            display: flex; 
            background: white; 
            padding-bottom: env(safe-area-inset-bottom); 
            flex-shrink: 0; 
            z-index: 5000; 
        }
        .nav-item { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: #94a3b8; 
            font-size: 11px; 
            font-weight: 800; 
            cursor:pointer; 
        }
        .nav-item.active { color: #4f46e5; }
        .nav-item span { font-size: 22px; }

        .hero-section { background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('https://images.unsplash.com/photo-1449156001935-52614a37d6b5?auto=format&fit=crop&w=1600&q=80'); background-size: cover; background-position: center; min-height: 60vh; display: flex; align-items: center; justify-content: center; text-align: center; color: white; }
    </style>
</head>
<body>

<div id="landing-page">
    <section class="hero-section px-6">
        <div>
            <h1 class="text-emerald-400 font-black tracking-widest uppercase mb-2">TandilProp</h1>
            <h2 class="text-4xl font-black mb-6">Tu propiedad en el mapa.</h2>
            <button onclick="startApp()" class="bg-indigo-600 text-white px-10 py-5 rounded-full font-black text-lg shadow-2xl active:scale-95 transition-all uppercase">
                Ver Mapa Vivo
            </button>
        </div>
    </section>
    <section class="p-8 text-center bg-white">
        <h3 class="text-2xl font-black italic text-slate-800 mb-4">Mercado Real Estate Tandil</h3>
        <p class="text-slate-600 max-w-xl mx-auto mb-8 text-sm">Acceso directo a dueños e inmobiliarias con geolocalización de precisión. Datos actualizados 2026.</p>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-slate-50 p-4 rounded-2xl border">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Valor m²</p>
                <p class="text-xl font-black text-indigo-600">U$D 1.250</p>
            </div>
            <div class="bg-slate-50 p-4 rounded-2xl border">
                <p class="text-[10px] font-bold text-slate-400 uppercase">En oferta</p>
                <p class="text-xl font-black text-indigo-600">+1.200</p>
            </div>
        </div>
    </section>
</div>

<div class="app-shell" id="main-app">
    <header>
        <div class="flex justify-between items-center mb-2">
            <h1 onclick="goBack()" class="text-2xl font-black text-indigo-600 italic tracking-tighter">TANDILPROP</h1>
            <div class="bg-indigo-100 px-3 py-1 rounded-full text-[8px] font-black text-indigo-600 uppercase">App v2.0</div>
        </div>
        <div class="flex gap-2">
            <select id="f-type" onchange="loadData()" class="flex-1 p-2 bg-slate-50 border rounded-lg text-[10px] font-bold outline-none">
                <option value="todos">TIPO: TODOS</option>
                <option value="casa">🏠 CASAS</option>
                <option value="depto">🏢 DEPTOS</option>
                <option value="terreno">🌳 TERRENOS</option>
            </select>
            <select id="f-op" onchange="loadData()" class="flex-1 p-2 bg-indigo-50 text-indigo-600 border rounded-lg text-[10px] font-bold outline-none">
                <option value="todos">OPERACIÓN</option>
                <option value="venta">VENTA</option>
                <option value="alquiler">ALQUILER</option>
            </select>
        </div>
    </header>

    <div class="main-content">
        <div id="v-map" class="view active">
            <div id="map"></div>
            <button id="btn-confirm" onclick="openForm()" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-[500] bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black border-2 border-white shadow-2xl hidden">📍 PUBLICAR AQUÍ</button>
        </div>
        
        <div id="v-list" class="view bg-slate-50">
            <div id="l-container" class="p-4 space-y-4"></div>
            <div class="h-24"></div>
        </div>

        <div id="v-form" class="view p-6">
            <h2 class="text-2xl font-black mb-6 italic text-indigo-600 uppercase">Anunciar</h2>
            <div class="space-y-4 pb-32">
                <input type="text" id="p-title" placeholder="Título" class="w-full p-4 bg-slate-100 rounded-xl font-bold">
                <select id="p-type" class="w-full p-4 bg-slate-100 rounded-xl font-bold"><option value="casa">Casa</option><option value="depto">Depto</option><option value="terreno">Terreno</option></select>
                <input type="file" id="p-file" accept="image/*" class="w-full p-3 bg-white border-2 border-dashed rounded-xl text-xs font-bold">
                <input type="number" id="p-price" placeholder="U$D Precio" class="w-full p-4 bg-slate-100 rounded-xl font-bold">
                <input type="text" id="p-wa" placeholder="WhatsApp (249...)" class="w-full p-4 bg-slate-100 rounded-xl font-bold">
                <button onclick="saveProp()" id="btn-save" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black uppercase">Publicar</button>
                <button onclick="cancelAdd()" class="w-full py-4 text-slate-400 font-bold">Cancelar</button>
            </div>
        </div>
    </div>

    <nav>
        <div onclick="showView('map')" id="t-map" class="nav-item active">
            <span>🗺️</span> MAPA
        </div>
        <div onclick="showView('list')" id="t-list" class="nav-item">
            <span>📋</span> LISTA
        </div>
    </nav>
</div>

<script>
    function startApp() {
        document.getElementById('landing-page').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        setTimeout(() => map.invalidateSize(), 500);
    }

    function goBack() {
        document.getElementById('main-app').style.display = 'none';
        document.getElementById('landing-page').style.display = 'block';
    }

    const firebaseConfig = {
        apiKey: "AIzaSyBUViSxd76R5Xc3h4obWtbkGEXADPH8qTw",
        authDomain: "tandilprop-56ec1.firebaseapp.com",
        projectId: "tandilprop-56ec1",
        databaseURL: "https://tandilprop-56ec1-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('tandil_vfinal_fix');

    var map = L.map('map', {zoomControl: false, attributionControl: false, tap: false}).setView([-37.3217, -59.1332], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var latC, lngC, tempM;

    map.on('click', function(e) {
        if (e.originalEvent.target.classList.contains('leaflet-marker-icon')) return;
        if(tempM) map.removeLayer(tempM);
        latC = e.latlng.lat; lngC = e.latlng.lng;
        tempM = L.marker([latC, lngC], {draggable: true}).addTo(map);
        document.getElementById('btn-confirm').style.display = 'block';
    });

    function showView(v) {
        document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
        document.getElementById('v-' + v).classList.add('active');
        document.getElementById('t-' + v).classList.add('active');
        if(v === 'map') setTimeout(() => map.invalidateSize(), 300);
        else document.getElementById('btn-confirm').style.display = 'none';
    }

    function openForm() { showView('form'); }
    function cancelAdd() { if(tempM) map.removeLayer(tempM); document.getElementById('btn-confirm').style.display = 'none'; showView('map'); }

    async function saveProp() {
        const btn = document.getElementById('btn-save');
        const fileInput = document.getElementById('p-file');
        const title = document.getElementById('p-title').value;
        const price = document.getElementById('p-price').value;
        const wa = document.getElementById('p-wa').value;
        if(!title || !price || !wa) return alert("Faltan datos");
        btn.disabled = true; btn.innerText = "Subiendo...";
        let imgData = "https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=500";
        if(fileInput.files[0]) {
            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = () => {
                db.push({ title, price, wa, type: document.getElementById('p-type').value, img: reader.result, lat: latC, lng: lngC })
                .then(() => { alert("Publicado!"); location.reload(); });
            };
        }
    }

    function loadData() {
        db.on('value', snap => {
            const list = snap.val() ? Object.values(snap.val()) : [];
            const tF = document.getElementById('f-type').value;
            const oF = document.getElementById('f-op').value;
            map.eachLayer(l => { if(l instanceof L.Marker && l !== tempM) map.removeLayer(l); });
            let html = "";
            list.reverse().forEach(p => {
                if(tF !== 'todos' && p.type !== tF) return;
                var m = L.marker([p.lat, p.lng]).addTo(map);
                if(m.getElement()) m.getElement().classList.add('pin-' + p.type);
                html += `<div class="bg-white rounded-[2rem] p-4 shadow-sm border flex flex-col items-center text-center">
                    <img src="${p.img}" class="w-full h-40 object-cover rounded-[1.5rem] mb-2">
                    <h4 class="font-black uppercase text-xs">${p.title}</h4>
                    <p class="text-xl font-black text-indigo-600 mb-2">U$D ${p.price}</p>
                    <a href="https://wa.me/${p.wa}" class="bg-slate-900 text-white w-full py-3 rounded-xl font-black text-[10px] uppercase">Contactar</a>
                </div>`;
            });
            document.getElementById('l-container').innerHTML = html;
        });
    }
    loadData();
</script>
</body>
    </html>
