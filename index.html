<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5719496512652584" crossorigin="anonymous"></script>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TandilProp | Mercado Inmobiliario</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            background: #fff; font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }

        /* --- LANDING PAGE --- */
        #landing-page { 
            height: 100%; overflow-y: auto; width: 100%; 
            display: block; 
        }

        /* --- APP LAYOUT (EL FIX) --- */
        .app-shell { 
            display: none; 
            grid-template-rows: auto 1fr auto; /* Header | Mapa | Nav */
            height: 100dvh; /* dvh se adapta mejor a móviles */
            width: 100%; 
            position: fixed; top: 0; left: 0; 
            z-index: 2000; background: white; 
        }

        header { 
            background: white; border-bottom: 2px solid #f1f5f9; 
            padding: 10px 15px; z-index: 10;
        }

        .main-content { 
            position: relative; overflow: hidden; 
            background: #f8fafc; 
        }

        #map { width: 100%; height: 100%; z-index: 1; }

        .view { 
            position: absolute; inset: 0; 
            background: white; z-index: 10; 
            display: none; overflow-y: auto;
        }
        .view.active { display: block; }

        nav { 
            height: 70px; background: white; 
            border-top: 2px solid #f1f5f9; 
            display: flex; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 3000;
        }

        .nav-item { 
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            color: #94a3b8; font-size: 11px; font-weight: 800; cursor: pointer;
        }
        .nav-item.active { color: #4f46e5; }
        .nav-item span { font-size: 20px; }

        /* Colores de pines */
        .pin-casa { filter: hue-rotate(190deg) brightness(0.9); }
        .pin-depto { filter: hue-rotate(15deg) saturate(3); }
        .pin-terreno { filter: hue-rotate(80deg) brightness(0.8); }

        /* Botón Publicar */
        #btn-confirm {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 500; background: #4f46e5; color: white; 
            padding: 12px 24px; border-radius: 15px; font-weight: 900;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
            display: none; white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="landing-page">
    <section class="bg-slate-800 text-white min-h-[60vh] flex items-center justify-center text-center p-6">
        <div>
            <p class="text-emerald-400 font-black uppercase tracking-widest text-sm mb-2">TandilProp</p>
            <h1 class="text-4xl md:text-6xl font-black mb-6">Tu propiedad en el mapa.</h1>
            <button onclick="startApp()" class="bg-indigo-600 px-8 py-4 rounded-full font-black text-lg shadow-xl active:scale-95 transition-all">VER MAPA VIVO</button>
        </div>
    </section>

    <section class="p-8 bg-white max-w-4xl mx-auto">
        <h2 class="text-2xl font-black text-slate-800 mb-6 italic border-l-4 border-indigo-600 pl-4 uppercase">Mercado Real Estate Tandil</h2>
        <p class="text-slate-500 mb-10 text-sm leading-relaxed">Acceso directo a dueños e inmobiliarias con geolocalización de precisión. Datos actualizados 2026.</p>
        
        <div class="grid grid-cols-2 gap-4 mb-12">
            <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Valor m²</p>
                <p class="text-2xl font-black text-indigo-600">U$D 1.250</p>
            </div>
            <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                <p class="text-[10px] font-black text-slate-400 uppercase mb-1">En oferta</p>
                <p class="text-2xl font-black text-indigo-600">+1.200</p>
            </div>
        </div>
    </section>
</div>

<div class="app-shell" id="main-app">
    <header>
        <div class="flex justify-between items-center mb-2">
            <h1 onclick="goBack()" class="text-xl font-black text-indigo-600 italic tracking-tighter">TANDILPROP</h1>
            <span class="text-[9px] font-black bg-indigo-50 text-indigo-600 px-2 py-1 rounded-md uppercase">V2.0</span>
        </div>
        <div class="flex gap-2">
            <select id="f-type" onchange="loadData()" class="flex-1 p-2 bg-slate-50 border rounded-lg text-[10px] font-bold outline-none">
                <option value="todos">TIPO: TODOS</option>
                <option value="casa">🏠 CASAS</option>
                <option value="depto">🏢 DEPTOS</option>
                <option value="terreno">🌳 TERRENOS</option>
            </select>
            <select id="f-op" onchange="loadData()" class="flex-1 p-2 bg-indigo-50 text-indigo-600 border rounded-lg text-[10px] font-bold outline-none">
                <option value="todos">OPERACIÓN</option>
                <option value="venta">VENTA</option>
                <option value="alquiler">ALQUILER</option>
            </select>
        </div>
    </header>

    <div class="main-content">
        <div id="v-map" class="view active">
            <div id="map"></div>
            <button id="btn-confirm" onclick="openForm()">📍 PUBLICAR AQUÍ</button>
        </div>
        <div id="v-list" class="view bg-slate-50 p-4">
            <div id="l-container" class="space-y-4"></div>
            <div class="h-20"></div>
        </div>
        </div>

    <nav>
        <div onclick="showView('map')" id="t-map" class="nav-item active">
            <span>🗺️</span> MAPA
        </div>
        <div onclick="showView('list')" id="t-list" class="nav-item">
            <span>📋</span> LISTA
        </div>
    </nav>
</div>

<script>
    function startApp() {
        document.getElementById('landing-page').style.display = 'none';
        const shell = document.getElementById('main-app');
        shell.style.display = 'grid'; // Usamos grid para el layout
        setTimeout(() => map.invalidateSize(), 400);
    }

    function goBack() {
        document.getElementById('main-app').style.display = 'none';
        document.getElementById('landing-page').style.display = 'block';
    }

    // Inicialización Firebase y Mapa... (Copia el resto de tu lógica anterior aquí)
    // Asegúrate de copiar la parte de: map.on('click'), saveProp() y loadData()
</script>
</body>
                                                                                                                                             </html>
